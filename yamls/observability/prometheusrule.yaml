apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: nginx-rules
  namespace: default
spec:
  groups:
    - name: nginx.rules
      interval: 30s
      rules:
        - alert: NginxDown
          expr: up{job="nginx"} == 0
          for: 5m
          annotations:
            summary: "Nginx is down"
