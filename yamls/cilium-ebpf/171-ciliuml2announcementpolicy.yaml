# Item 171: CiliumL2AnnouncementPolicy
# Cilium L2 announcement policy for ARP/NDP broadcasts
apiVersion: cilium.io/v2alpha1
kind: CiliumL2AnnouncementPolicy
metadata:
  name: default-l2-announcement
  namespace: karpenter
spec:
  externalIPs: true
  loadBalancerIPs: true
  # Nodes on which to announce
  nodeSelector:
    matchExpressions:
      - key: node-role.kubernetes.io/master
        operator: NotIn
        values: ["true"]
  # Interfaces to use for announcements
  interfaces:
    - eth0
    - eth1
  # Address pools to announce
  addressPools:
    - cidr: 10.100.0.0/24
    - cidr: 10.101.0.0/24
