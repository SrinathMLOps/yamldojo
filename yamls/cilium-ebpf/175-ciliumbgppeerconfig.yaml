# Item 175: CiliumBGPPeerConfig
# BGP peer configuration details
apiVersion: cilium.io/v2alpha1
kind: CiliumBGPPeerConfig
metadata:
  name: bgp-peer-external
  namespace: karpenter
spec:
  transport:
    port: 179
  timers:
    connectRetry: 10
    holdTime: 90
    keepAliveTime: 30
  gracefulRestart:
    enabled: true
    restartTimeSeconds: 120
  families:
    - afi: ipv4
      safi: unicast
    - afi: ipv6
      safi: unicast
  authSecretRef:
    name: bgp-peer-password
  nodeSelector:
    matchLabels:
      bgp-capable: "true"
