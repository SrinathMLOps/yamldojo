# Item 172: CiliumBGPPeeringPolicy
# BGP peering policy for Cilium's native BGP control plane
apiVersion: cilium.io/v2alpha1
kind: CiliumBGPPeeringPolicy
metadata:
  name: bgp-peering-setup
  namespace: karpenter
spec:
  nodeSelector:
    matchLabels:
      bgp-peering: enabled
  virtualRouters:
    - localASN: 64512
      exportPodCIDR: true
      neighbors:
        - peerAddress: 192.168.1.1
          peerASN: 64513
          gracefulRestart:
            enabled: true
            restartTimeSeconds: 120
          families:
            - afi: ipv4
              safi: unicast
        - peerAddress: 2001:db8::1
          peerASN: 64514
          families:
            - afi: ipv6
              safi: unicast
  serviceSelector:
    matchLabels:
      bgp-advertise: enabled
