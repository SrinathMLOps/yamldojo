# Item 209: Vault Dynamic Secret
# VaultDynamicSecret retrieves dynamic secrets (e.g., database credentials)
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultDynamicSecret
metadata:
  name: vault-dynamic-db
  namespace: production
spec:
  vaultAuthRef: vault-auth
  mount: database
  path: creds/prod-db-role
  requestHTTPMethod: POST
  refreshAfter: 3600s
  allowStaticCreds: false
  destination:
    create: true
    name: dynamic-db-creds
  rolloutRestartTargets:
    - kind: Deployment
      name: app-backend
