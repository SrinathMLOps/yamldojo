# Item 208: Vault Static Secret
# VaultStaticSecret retrieves static secrets from Vault
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: vault-static-secret
  namespace: production
spec:
  vaultAuthRef: vault-auth
  mount: secret
  type: kv-v2
  path: data/production/database
  refreshAfter: 3600s
  destination:
    create: true
    name: vault-secret-synced
    transformation:
      templates:
        engineTemplate: |
          {
            "username": "{{ .username }}",
            "password": "{{ .password }}"
          }
