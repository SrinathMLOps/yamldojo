# Item 205: External Secrets - PushSecret
# PushSecret pushes K8s secrets to external secret managers
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: push-db-secret
  namespace: production
spec:
  refreshInterval: 10m
  secretStoreRefs:
    - name: aws-secret-store
      kind: SecretStore
  selector:
    secret:
      name: database-secret
  data:
    - secretKey: username
      remoteRef:
        remoteKey: /prod/db/username
    - secretKey: password
      remoteRef:
        remoteKey: /prod/db/password
