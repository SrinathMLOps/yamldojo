# Item 202: External Secrets - ExternalSecret
# ExternalSecret fetches secrets from external secret managers
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: aws-secrets
  namespace: production
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: aws-secret-store
    kind: SecretStore
  target:
    name: fetched-secret
    creationPolicy: Owner
    template:
      metadata:
        labels:
          managed-by: external-secrets
      type: Opaque
      data:
        username: "{{ .username | b64enc }}"
        password: "{{ .password | b64enc }}"
  data:
    - secretKey: username
      remoteRef:
        key: /prod/db/username
    - secretKey: password
      remoteRef:
        key: /prod/db/password
