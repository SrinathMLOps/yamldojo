# Item 206: External Secrets - ClusterExternalSecret
# ClusterExternalSecret creates ExternalSecrets across multiple namespaces
apiVersion: external-secrets.io/v1alpha1
kind: ClusterExternalSecret
metadata:
  name: cluster-wide-secrets
spec:
  refreshTime: 1h
  externalSecretSpec:
    secretStoreRef:
      name: global-aws-store
      kind: ClusterSecretStore
    target:
      name: synced-secret
      creationPolicy: Owner
    data:
      - secretKey: api-key
        remoteRef:
          key: /global/api-key
      - secretKey: db-connection
        remoteRef:
          key: /global/db-connection
  namespaceSelector:
    matchLabels:
      sync-secrets: "true"
