# Item 230: Flux - ImagePolicy
# ImagePolicy selects images based on tags/semver
apiVersion: image.toolkit.fluxcd.io/v1beta1
kind: ImagePolicy
metadata:
  name: app-version-policy
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: app-registry
  policy:
    semver:
      range: '>=1.0.0 <2.0.0'
