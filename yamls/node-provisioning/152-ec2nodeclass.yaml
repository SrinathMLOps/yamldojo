# Item 152: Karpenter EC2NodeClass
# EC2NodeClass provides AWS EC2-specific configuration for nodes provisioned by Karpenter
apiVersion: karpenter.k8s.aws/v1beta1
kind: EC2NodeClass
metadata:
  name: default
  namespace: karpenter
spec:
  amiFamily: AL2
  role: "KarpenterNodeRole"
  subnetSelector:
    karpenter.sh/discovery: "true"
  securityGroupSelector:
    karpenter.sh/discovery: "true"
  tags:
    ManagedBy: karpenter
    Environment: production
  userData: |
    #!/bin/bash
    echo "Node initialized by Karpenter"
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 100Gi
        volumeType: gp3
        deleteOnTermination: true
  metadataOptions:
    httpEndpoint: enabled
    httpProtocolIPv6: disabled
    httpPutResponseHopLimit: 2
  # IAM instance profile for node permissions
  iamInstanceProfile: "KarpenterNodeInstanceProfile"
  # Enable detailed monitoring
  detailedMonitoring: true
