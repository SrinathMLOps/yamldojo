# Item 154: Cluster Autoscaler Deployment
# Cluster Autoscaler automatically scales nodes based on pod requirements
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cluster-autoscaler
  namespace: karpenter
  labels:
    app: cluster-autoscaler
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cluster-autoscaler
  template:
    metadata:
      labels:
        app: cluster-autoscaler
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8085"
    spec:
      priorityClassName: system-cluster-critical
      serviceAccountName: cluster-autoscaler
      containers:
        - name: cluster-autoscaler
          image: k8s.gcr.io/autoscaling/cluster-autoscaler:v1.27.0
          args:
            - --cloud-provider=aws
            - --expander=least-waste
            - --scale-down-enabled=true
            - --scale-down-delay-after-add=10m
            - --scale-down-delay-after-failure=3m
            - --scale-down-delay-after-delete=0s
            - --new-pod-scale-down-delay=2m
          resources:
            requests:
              cpu: 100m
              memory: 300Mi
            limits:
              cpu: 500m
              memory: 500Mi
          ports:
            - containerPort: 8085
              name: metrics
          env:
            - name: AWS_REGION
              value: us-east-1
          livenessProbe:
            httpGet:
              path: /health-check
              port: 8085
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /ready
              port: 8085
            initialDelaySeconds: 15
            periodSeconds: 20
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: ["cluster-autoscaler"]
                topologyKey: kubernetes.io/hostname
