# Item 151: Karpenter NodePool
# A NodePool defines a group of nodes that can be managed by Karpenter for auto-scaling
apiVersion: karpenter.sh/v1beta1
kind: NodePool
metadata:
  name: default-nodepool
  namespace: karpenter
spec:
  # Template defines the node configuration to provision
  template:
    metadata:
      labels:
        workload-type: general
    spec:
      requirements:
        # CPU requirements: can range from 1 to 100 cores
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: kubernetes.io/instance-type
          operator: In
          values: ["t3.medium", "t3.large", "m5.large", "m5.xlarge"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand", "spot"]
        - key: karpenter.sh/do-not-consolidate
          operator: In
          values: ["false"]
      # Node class reference for EC2 configuration
      nodeClassRef:
        name: default
  # Limits define how many resources this pool can provision
  limits:
    cpu: 1000
    memory: 1000Gi
  # Disruption budget for controlled node termination
  disruption:
    consolidateAfter: 30s
    expireAfter: 720h
    budgets:
      - nodes: "10%"
        schedule: "0 9 * * mon-fri"
        duration: 8h
  # Weight for scheduling priority (higher = higher priority)
  weight: 100
