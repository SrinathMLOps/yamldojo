# Item 342: Machine (Cluster API)
apiVersion: machine.cluster.x-k8s.io/v1beta1
kind: Machine
metadata:
  name: my-machine-1
  namespace: default
spec:
  clusterName: my-cluster
  bootstrap:
    dataSecretName: my-machine-bootstrap
  infrastructureRef:
    apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
    kind: AWSMachine
    name: my-machine-1

---
# Item 343: MachineDeployment
apiVersion: machine.cluster.x-k8s.io/v1beta1
kind: MachineDeployment
metadata:
  name: my-machine-deployment
  namespace: default
spec:
  replicas: 3
  selector:
    matchLabels:
      pool: worker
  template:
    metadata:
      labels:
        pool: worker
    spec:
      clusterName: my-cluster
      infrastructureRef:
        apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
        kind: AWSMachineTemplate
        name: my-machine-template

---
# Item 344: MachineSet
apiVersion: machine.cluster.x-k8s.io/v1beta1
kind: MachineSet
metadata:
  name: my-machineset
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      pool: worker
  template:
    metadata:
      labels:
        pool: worker
    spec:
      clusterName: my-cluster
      infrastructureRef:
        apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
        kind: AWSMachine
        name: my-machine

---
# Item 345: MachineHealthCheck
apiVersion: machine.cluster.x-k8s.io/v1beta1
kind: MachineHealthCheck
metadata:
  name: machine-health-check
  namespace: default
spec:
  clusterName: my-cluster
  selector:
    matchLabels:
      pool: worker
  unhealthyConditions:
    - type: Ready
      status: Unknown
      timeout: 5m
    - type: Ready
      status: "False"
      timeout: 5m

---
# Item 346: ClusterClass
apiVersion: cluster.x-k8s.io/v1beta1
kind: ClusterClass
metadata:
  name: my-cluster-class
  namespace: default
spec:
  controlPlane:
    ref:
      apiVersion: controlplane.cluster.x-k8s.io/v1beta1
      kind: KubeadmControlPlaneTemplate
      name: my-control-plane-template
  infrastructure:
    ref:
      apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
      kind: AWSClusterTemplate
      name: my-cluster-template
  workers:
    machineDeployments:
      - class: default-worker
        template:
          ref:
            apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
            kind: AWSMachineTemplate
            name: default-worker-template

