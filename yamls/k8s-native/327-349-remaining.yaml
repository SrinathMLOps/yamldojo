# Item 336: FlowSchema
apiVersion: flowcontrol.apiserver.k8s.io/v1beta3
kind: FlowSchema
metadata:
  name: exempt-workloads
spec:
  distinguisherMethod:
    type: ByUser
  matchingPrecedence: 1000
  priorityLevelConfiguration:
    name: exempt-level
  rules:
    - subjects:
        - kind: ServiceAccount
          serviceAccount:
            name: admin
            namespace: kube-system

---
# Item 337: PriorityLevelConfiguration
apiVersion: flowcontrol.apiserver.k8s.io/v1beta3
kind: PriorityLevelConfiguration
metadata:
  name: global-default
spec:
  type: Limited
  limited:
    assuredConcurrencyShares: 20
    limitResponse:
      type: Queue
      queuing:
        handSize: 6
        queueLengthLimit: 50

---
# Item 338: MutatingAdmissionPolicy
apiVersion: admissionregistration.k8s.io/v1alpha1
kind: MutatingAdmissionPolicy
metadata:
  name: pod-mutation-policy
spec:
  failurePolicy: fail
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE"]
        resources: ["pods"]
  mutations:
    - expression: "object.spec.securityContext = {'runAsNonRoot': true}"

---
# Item 339: MutatingAdmissionPolicyBinding
apiVersion: admissionregistration.k8s.io/v1alpha1
kind: MutatingAdmissionPolicyBinding
metadata:
  name: pod-mutation-binding
spec:
  policyName: pod-mutation-policy
  paramRef:
    name: ""
  matchResources:
    excludedNamespaces: ["kube-system"]

