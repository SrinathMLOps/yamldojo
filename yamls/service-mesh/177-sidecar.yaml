# Item 177: Istio Sidecar
# Sidecar configuration for fine-grained control over sidecar behavior
apiVersion: networking.istio.io/v1alpha3
kind: Sidecar
metadata:
  name: default-sidecar
  namespace: production
spec:
  workloadSelector:
    labels:
      app: backend
  # Configure which hosts are accessible from this workload
  egress:
    - hosts:
        - "production/*"
        - "kube-system/dns"
      port:
        number: 53
        protocol: UDP
    - hosts:
        - "*/*"
      port:
        number: 443
        protocol: HTTPS
  # Configure ingress (traffic entering the sidecar)
  ingress:
    - port:
        number: 8080
        protocol: HTTP
        name: http-8080
      defaultEndpoint: "127.0.0.1:8080"
    - port:
        number: 8443
        protocol: HTTPS
        name: https-8443
      defaultEndpoint: "127.0.0.1:8443"
  # Outbound traffic policy
  outboundTrafficPolicy:
    mode: ALLOW_ANY
