# Item 195: Gateway API - Gateway
# Gateway represents a loadbalancer for traffic with routes
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: api-gateway
  namespace: production
spec:
  gatewayClassName: istio
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      hostname: "api.example.com"
      allowedRoutes:
        namespaces:
          from: Same
        kinds:
          - group: gateway.networking.k8s.io
            kind: HTTPRoute
    - name: https
      port: 443
      protocol: HTTPS
      hostname: "api.example.com"
      tls:
        mode: Terminate
        certificateRefs:
          - name: api-tls-cert
            kind: Secret
            group: ""
      allowedRoutes:
        namespaces:
          from: Same
    - name: grpc
      port: 50051
      protocol: HTTPS
      hostname: "grpc-api.example.com"
      tls:
        mode: Terminate
        certificateRefs:
          - name: grpc-tls-cert
            kind: Secret
      allowedRoutes:
        kinds:
          - group: gateway.networking.k8s.io
            kind: GRPCRoute
