# Item 189: Gateway API - GRPCRoute
# GRPCRoute represents a gRPC route within a Gateway
apiVersion: gateway.networking.k8s.io/v1
kind: GRPCRoute
metadata:
  name: api-grpc-route
  namespace: production
spec:
  parentRefs:
    - name: api-gateway
      namespace: production
      sectionName: grpc
  hostnames:
    - "api.example.com"
  rules:
    - matches:
        - method:
            service: "api.v1.ApiService"
            method: "GetUser"
      backendRefs:
        - name: api-service
          port: 50051
          weight: 100
    - matches:
        - method:
            service: "api.v1.ApiService"
            method: "ListUsers"
      backendRefs:
        - name: api-service
          port: 50051
          weight: 100
    - matches:
        - headers:
            - name: x-user-type
              value: "admin"
      backendRefs:
        - name: admin-api-service
          port: 50052
  timeouts:
    backendRequest: "30s"
