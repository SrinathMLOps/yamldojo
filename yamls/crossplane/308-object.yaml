# Item 308: Crossplane Object (for unstructured resources)
apiVersion: kubernetes.crossplane.io/v1alpha1
kind: Object
metadata:
  name: custom-k8s-resource
  namespace: crossplane-system
spec:
  forProvider:
    manifest:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: external-config
        namespace: production
      data:
        key: value
