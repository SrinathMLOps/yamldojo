# Item 221: Argo Rollouts - Rollout
# Rollout provides advanced deployment strategies (canary, blue-green)
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: app-rollout
  namespace: production
spec:
  replicas: 3
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
        - name: myapp
          image: myapp:v1.0
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
  strategy:
    canary:
      steps:
        - weight: 20
          pause: {duration: 5m}
        - weight: 40
          pause: {duration: 5m}
        - weight: 60
          pause: {duration: 5m}
        - weight: 80
          pause: {duration: 5m}
      analysis:
        interval: 1m
        threshold: 5
        metrics:
          - name: success-rate
            interval: 1m
  revisionMetadata:
    labels:
      version: v1.0
