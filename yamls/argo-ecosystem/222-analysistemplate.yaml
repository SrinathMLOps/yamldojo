# Item 222: Argo Rollouts - AnalysisTemplate
# AnalysisTemplate defines metrics and thresholds for automated analysis
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: success-rate-analysis
  namespace: production
spec:
  args:
    - name: service-name
      value: "myapp"
    - name: prometheus-query
      value: "sum(rate(http_request_total{job='{{service-name}}'}[5m])) by (status_code)"
  metrics:
    - name: success-rate
      interval: 1m
      count: 5
      threshold: 95
      provider:
        prometheus:
          address: "http://prometheus:9090"
          query: |
            sum(rate(http_requests_total{job="{{service-name}}", status=~"2.."}[5m])) 
            / 
            sum(rate(http_requests_total{job="{{service-name}}"}[5m]))
    - name: error-rate
      interval: 1m
      count: 5
      threshold: 5
      provider:
        prometheus:
          address: "http://prometheus:9090"
          query: |
            sum(rate(http_requests_total{job="{{service-name}}", status=~"5.."}[5m])) 
            / 
            sum(rate(http_requests_total{job="{{service-name}}"}[5m]))
