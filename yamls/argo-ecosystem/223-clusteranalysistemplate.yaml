# Item 223: Argo Rollouts - ClusterAnalysisTemplate
# ClusterAnalysisTemplate is a cluster-wide analysis template
apiVersion: argoproj.io/v1alpha1
kind: ClusterAnalysisTemplate
metadata:
  name: global-analysis-template
spec:
  args:
    - name: baseline-threshold
      value: "95"
  metrics:
    - name: latency-p99
      interval: 30s
      count: 10
      threshold: 500  # ms
      provider:
        prometheus:
          address: "http://prometheus:9090"
          query: "histogram_quantile(0.99, http_request_duration_ms)"
    - name: cpu-usage
      interval: 30s
      count: 5
      threshold: 80  # percent
      provider:
        prometheus:
          address: "http://prometheus:9090"
          query: "avg(rate(container_cpu_usage_seconds_total[5m])) * 100"
