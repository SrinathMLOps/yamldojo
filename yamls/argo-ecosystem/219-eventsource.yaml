# Item 219: Argo Events - EventSource
# EventSource defines the source of events to trigger workflows
apiVersion: argoproj.io/v1alpha1
kind: EventSource
metadata:
  name: github-events
  namespace: argo-events
spec:
  service:
    ports:
      - port: 12000
        targetPort: 12000
  github:
    push-events:
      owner: example
      repository: my-repo
      branch: main
      events:
        - push
      active: true
      contentType: json
      insecureSkipVerify: false
      metadata:
        repository: "my-repo"
    pull-request-events:
      owner: example
      repository: my-repo
      events:
        - pull_request
      active: true
